version: "3.9"

networks:
  reverse-proxy:
    external: true

volumes:
  loki-data:
    driver: local
  promtail-positions:
    driver: local

services:
  # ── Loki ──────────────────────────────────────────────────────────
  #   Internal only: http://loki:3100 (overlay network)
  #   No Traefik — not accessible externally
  loki:
    image: grafana/loki:3.1.0
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./grafana/loki/config.yml:/etc/loki/config.yml:ro
      - /mnt/user/docker/volumes/grafana/loki:/loki
    networks:
      reverse-proxy:
    deploy:
      placement:
        constraints:
          - node.role == manager
  # ── Promtail ─────────────────────────────────────────────────────
  #   Runs on every node, auto-discovers all swarm services
  promtail:
    image: grafana/promtail:3.1.0
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./grafana/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/tmp
    networks:
      reverse-proxy:
    deploy:
      mode: global
