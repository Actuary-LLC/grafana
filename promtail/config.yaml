server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Swarm service name → "service" label (this is what we query on)
      - source_labels:
          - __meta_docker_container_label_com_docker_swarm_service_name
        regex: "(.+)"
        target_label: service

      # Container name (includes task slot: "my_service.1.abc123")
      - source_labels:
          - __meta_docker_container_name
        regex: "/?(.*)"
        target_label: container

      # Swarm node ID
      - source_labels:
          - __meta_docker_container_label_com_docker_swarm_node_id
        target_label: swarm_node

      # stdout vs stderr
      - source_labels:
          - __meta_docker_container_log_stream
        target_label: stream

      # Task name (includes slot)
      - source_labels:
          - __meta_docker_container_label_com_docker_swarm_task_name
        target_label: task

    pipeline_stages:
      # Attempt to parse structured JSON logs
      - json:
          expressions:
            level: level
            msg: msg
            message: message
      - labels:
          level:
